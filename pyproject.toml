[tool.ruff]
# Longitud máxima de línea (100 es el estándar de Black)
line-length = 100
# Ignorar la carpeta de notebooks para que no te arroje errores por código en celdas
exclude =[".git", "__pycache__", "notebooks", "data"]

[tool.ruff.lint]
# E: Errores de estilo (PEP8)
# F: Errores lógicos (variables no usadas, imports rotos)
# I: Ordenamiento automático de imports (isort)
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."] # Permite que los tests importen tu carpeta src/
